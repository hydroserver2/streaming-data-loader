<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HydroServer Streaming Data Loader</title>
  </head>
  <body>
    <div class="flex min-h-screen">
      <nav
        id="app-sidebar"
        class="flex w-16 shrink-0 flex-col items-center gap-2 border-r border-slate-200 bg-white px-3 py-4"
      >
        <div
          class="mb-4 flex h-10 w-10 items-center justify-center rounded-2xl bg-sky-50 text-sky-700"
        >
          <span class="text-sm font-semibold">HS</span>
        </div>

        <a
          class="nav-item"
          data-route="dashboard"
          href="#dashboard"
          title="Jobs"
        >
          <svg
            viewBox="0 0 24 24"
            class="h-5 w-5 fill-none stroke-current stroke-[1.8]"
          >
            <rect x="4" y="5" width="16" height="14" rx="2"></rect>
            <path d="M8 9h8M8 13h8M8 17h5"></path>
          </svg>
        </a>

        <a
          class="nav-item"
          data-route="settings"
          href="#settings"
          title="Settings"
        >
          <svg
            viewBox="0 0 24 24"
            class="h-5 w-5 fill-none stroke-current stroke-[1.8]"
          >
            <path
              d="M12 3v4M12 17v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M3 12h4M17 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"
            ></path>
            <circle cx="12" cy="12" r="4"></circle>
          </svg>
        </a>

        <div class="mt-auto flex h-10 w-10 items-center justify-center">
          <span
            id="connection-status-dot"
            class="status-dot bg-slate-300"
            title="HydroServer not configured"
          ></span>
        </div>
      </nav>

      <main id="main-content" class="min-w-0 flex-1"></main>
    </div>
    <script type="module" src="/frontend/main.ts"></script>
  </body>
</html>
