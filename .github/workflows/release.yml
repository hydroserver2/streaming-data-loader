name: Release Bundles

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  verify-release:
    name: Verify Release
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify release tag matches app version
        shell: bash
        run: |
          VERSION=$(sed -nE 's/^version = "([^"]+)"$/\1/p' Cargo.toml | head -n 1)
          if [ -z "$VERSION" ]; then
            echo "Could not read [package].version from Cargo.toml."
            exit 1
          fi

          TAG="${{ github.event.release.tag_name }}"
          NORMALIZED_TAG="${TAG#refs/tags/}"
          NORMALIZED_TAG="${NORMALIZED_TAG#v}"

          if [ "$NORMALIZED_TAG" != "$VERSION" ]; then
            echo "Release tag does not match Cargo.toml version."
            echo "release tag: $TAG"
            echo "normalized tag: $NORMALIZED_TAG"
            echo "Cargo.toml version: $VERSION"
            exit 1
          fi

          echo "Release tag matches Cargo.toml version: $VERSION"

      - name: Run frontend unit tests
        run: npm test

      - name: Run Rust unit tests
        run: cargo test

  publish-bundles:
    name: Publish ${{ matrix.label }}
    needs: verify-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS universal DMG
            os: macos-15
            bundle_args: --target universal-apple-darwin --bundles dmg
            rust_targets: x86_64-apple-darwin
            release_asset_name_pattern: 'Streaming.Data.Loader.MacOS[ext]'
          - label: Windows NSIS
            os: windows-2022
            bundle_args: --bundles nsis
            rust_targets: ''
            release_asset_name_pattern: 'Streaming.Data.Loader.Windows[ext]'
          - label: Linux AppImage
            os: ubuntu-22.04
            bundle_args: --bundles appimage
            rust_targets: ''
            release_asset_name_pattern: 'Streaming.Data.Loader.Linux[ext]'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain and targets
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload bundle
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ github.event.release.id }}
          tagName: ${{ github.event.release.tag_name }}
          releaseAssetNamePattern: ${{ matrix.release_asset_name_pattern }}
          projectPath: .
          args: ${{ matrix.bundle_args }}
